# The IntelliJ Platform build runs on Android Studio 2026.1's bundled JBR 21.
# (Android Studio 2026.1 / build 261 requires JDK 21; your PATH `java` is 17.)
# If your Android Studio lives elsewhere, update this path.
org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home

org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=false

# The IntelliJ Platform provides the Kotlin stdlib at runtime; don't bundle our own.
kotlin.stdlib.default.dependency=false
