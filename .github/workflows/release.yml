name: Release

# Publishes to the JetBrains Marketplace when a version tag is pushed.
#
# >>> THE FIRST UPLOAD CANNOT BE AUTOMATED. <<<
# JetBrains provides no API for creating a *new* plugin listing; it must go through the web form at
# https://plugins.jetbrains.com/plugin/add#intellij once, by a human. This workflow publishes
# *subsequent* versions of an existing listing. Running it before that first manual upload will fail
# with a plugin-not-found error from the Marketplace, not create the listing.
#
# Tag to release:  git tag v0.1.1-beta && git push origin v0.1.1-beta
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build, verify and sign, but do not publish"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PLATFORM_ARGS: "-PplatformType=AI -PplatformVersion=2025.3.1.1"

jobs:
  release:
    name: Verify and publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # to create the GitHub release

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # gradle.properties pins `org.gradle.java.home` to the local Android Studio JBR, because a
      # developer's PATH java is typically 17 while the platform needs 21. That path does not exist on a
      # runner and Gradle rejects it before any task runs. Override it with the JDK just installed.
      # Keeping the pin in gradle.properties is deliberate — it is correct for the machine it describes.
      #
      # Computed in a step, not in `env:` above: JAVA_HOME is not known until setup-java has run, and
      # GitHub does not shell-expand `env:` values.
      - name: Point Gradle at the runner's JDK
        run: echo "JDK_ARG=-Dorg.gradle.java.home=$JAVA_HOME" >> "$GITHUB_ENV"

      # The tag and the version in build.gradle.kts are two places the same fact is written, so they
      # are checked against each other before anything is published. Publishing a version the source
      # does not claim is not correctable after the fact — the Marketplace does not allow re-uploading
      # over an existing version number.
      - name: Check the tag matches the project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(./gradlew -q $JDK_ARG printVersion $PLATFORM_ARGS)"
          echo "tag=$TAG  build.gradle.kts=$VERSION"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "::error::Tag '$TAG' does not match the project version '$VERSION'. Bump build.gradle.kts or retag."
            exit 1
          fi

      # Report the channel this version will land on, before it lands. It is derived from the version
      # suffix (see build.gradle.kts), so a missing suffix means the *stable* channel and everyone
      # browsing the Marketplace. That should never be a surprise in a log read after the fact.
      - name: Report the target channel
        run: |
          CHANNEL="$(./gradlew -q $JDK_ARG printReleaseChannel $PLATFORM_ARGS)"
          echo "Publishing to channel: $CHANNEL"
          echo "### Marketplace channel: \`$CHANNEL\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$CHANNEL" == "default" ]]; then
            echo "::warning::This publishes to the STABLE channel — every Marketplace visitor, not an opt-in audience."
          fi

      - name: Test
        run: ./gradlew $JDK_ARG test $PLATFORM_ARGS

      - name: Build the plugin
        run: ./gradlew $JDK_ARG buildPlugin $PLATFORM_ARGS

      # Only the extracted IDE and the verifier jar — not the 620 MB zip, which is redundant once
      # extracted and would roughly double the cache entry. `verify-plugin.sh` looks for `build.txt` to
      # decide whether to download, so a hit skips both the download and the unzip. No `restore-keys`:
      # the key pins exact IDE and verifier versions, and a fuzzy restore would verify against a
      # different IDE than this job claims to check.
      - name: Cache the verifier IDE
        uses: actions/cache@v6
        with:
          path: |
            /home/runner/.cache/sightline-verify/ideaIC-2025.3
            /home/runner/.cache/sightline-verify/verifier-cli-1.388.jar
          key: verifier-ide-2025.3-cli-1.388

      # A Marketplace review runs the verifier too. Failing here costs a re-tag; failing there costs a
      # rejected submission, so it gates the publish rather than following it.
      - name: Verify against the sinceBuild floor
        env:
          VERIFY_WORK_DIR: /home/runner/.cache/sightline-verify
          SKIP_BUILD: "1"
        run: tools/verify-plugin.sh

      # Optional. `signPlugin` is skipped when the key material is absent, so this is a no-op on a fork
      # or before signing is set up — it does not fail the release.
      - name: Sign the plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew $JDK_ARG signPlugin $PLATFORM_ARGS

      - name: Publish to the JetBrains Marketplace
        if: startsWith(github.ref, 'refs/tags/') && inputs.dry_run != true
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ -z "${PUBLISH_TOKEN:-}" ]]; then
            echo "::error::PUBLISH_TOKEN is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          ./gradlew $JDK_ARG publishPlugin $PLATFORM_ARGS

      - name: Attach the artifact to a GitHub release
        if: startsWith(github.ref, 'refs/tags/') && inputs.dry_run != true
        uses: softprops/action-gh-release@v3
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
          # A pre-release tag is marked as one on GitHub too, so the repo and the Marketplace channel
          # do not disagree about what this build is.
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload the artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sightline-plugin
          path: build/distributions/*.zip
          retention-days: 30
