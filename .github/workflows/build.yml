name: Build

# Every push to main and every pull request. This is the gate the release workflow assumes has
# already passed — it does not re-litigate correctness, it re-runs it against the tagged commit.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # The CI platform target. There is no Android Studio on a runner and `local()` cannot work, so the
  # build resolves a downloadable one instead — see build.gradle.kts.
  #
  # Why Android Studio and not IntelliJ IDEA Community: the build needs `org.jetbrains.android` on the
  # compile classpath for `ide/android/studio/StudioFactProvider`. **IC does not bundle it** — it ships
  # `android-gradle-dsl`, which is a different plugin — so an IC target cannot compile this project.
  # 2025.3.1.1 is build 253, which is also the `sinceBuild` floor, so CI compiles against the oldest
  # platform the listing claims to support rather than against a newer one that would hide a break.
  PLATFORM_ARGS: "-PplatformType=AI -PplatformVersion=2025.3.1.1"

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      # JDK 21: the platform requires it, and the project compiles to JVM 21 targets.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # gradle.properties pins `org.gradle.java.home` to the local Android Studio JBR, because a
      # developer's PATH java is typically 17 while the platform needs 21. That path does not exist on a
      # runner and Gradle rejects it before any task runs. Override it with the JDK just installed.
      # Keeping the pin in gradle.properties is deliberate — it is correct for the machine it describes.
      #
      # Computed in a step, not in `env:` above: JAVA_HOME is not known until setup-java has run, and
      # GitHub does not shell-expand `env:` values.
      - name: Point Gradle at the runner's JDK
        run: echo "JDK_ARG=-Dorg.gradle.java.home=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Test
        run: ./gradlew $JDK_ARG test $PLATFORM_ARGS

      - name: Build the plugin
        run: ./gradlew $JDK_ARG buildPlugin $PLATFORM_ARGS

      # The preview PNGs are the project's only automated visual channel (docs/TESTING.md). They are
      # written by the test task, not declared as task outputs, so they are collected here rather than
      # asserted on — a human still has to look at them.
      - name: Upload preview renders
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-renders
          path: |
            build/*.png
            build/marketplace/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports/tests/test
          retention-days: 14

      - name: Upload the plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: sightline-plugin
          path: build/distributions/*.zip
          retention-days: 14

  verify:
    name: Plugin Verifier
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build

    steps:
      - uses: actions/checkout@v7

      # Needed for the verifier itself, which resolves a JDK from the JAVA_HOME *environment variable*.
      # Gradle is deliberately not set up here: this job no longer builds anything.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Verify the artifact the build job already produced rather than building a second copy. The
      # script's SKIP_BUILD path exists for this.
      - name: Download the built plugin
        uses: actions/download-artifact@v8
        with:
          name: sightline-plugin
          path: build/distributions

      # The verifier needs a ~620 MB IDE zip which expands to well over a gigabyte. Only the
      # *extracted* IDE and the verifier jar are cached — not the zip, which is redundant once
      # extracted and would roughly double the entry. `verify-plugin.sh` decides whether to download by
      # looking for `build.txt` in the extracted directory, so a hit skips the download and the unzip.
      #
      # No `restore-keys` on purpose. The key pins the exact IDE and verifier versions; a fuzzy restore
      # would silently verify against a different IDE than the one this job claims to check.
      - name: Cache the verifier IDE
        uses: actions/cache@v6
        with:
          path: |
            /home/runner/.cache/sightline-verify/ideaIC-2025.3
            /home/runner/.cache/sightline-verify/verifier-cli-1.388.jar
          key: verifier-ide-2025.3-cli-1.388

      # NOT `./gradlew verifyPlugin` — that task cannot resolve an IDE under IntelliJ Platform Gradle
      # Plugin 2.6.0 (it looks under group `idea` rather than `com.jetbrains.intellij.idea`). The
      # script fetches the correct coordinate and runs the same verifier CLI. See its header.
      - name: Verify against the sinceBuild floor
        env:
          VERIFY_WORK_DIR: /home/runner/.cache/sightline-verify
          SKIP_BUILD: "1"
        run: tools/verify-plugin.sh

      - name: Upload the verifier report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verifier-report
          path: /home/runner/.cache/sightline-verify/last-report.txt
          if-no-files-found: warn
          retention-days: 14
